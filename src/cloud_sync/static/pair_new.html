<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>cloud-sync · new pair</title>
<style>:root{--bg:#0e0e10;--panel:#17171a;--panel-2:#1f1f24;--line:#2a2a30;--fg:#e5e5e7;--muted:#8a8a93;--accent:#3aa757}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}header{padding:12px 20px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:18px}header a{color:var(--fg);text-decoration:none}header h1{font-size:14px;margin:0 18px 0 0}header nav{display:flex;gap:14px;font-size:13px;color:var(--muted)}main{padding:20px;max-width:720px;margin:0 auto}.panel{background:var(--panel);padding:18px;border-radius:6px}h2{margin:0 0 16px;font-size:16px}label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}input,select,textarea{background:var(--panel-2);color:var(--fg);border:1px solid var(--line);padding:8px 10px;border-radius:4px;font:inherit;width:100%}textarea{font-family:ui-monospace,monospace;font-size:12px;min-height:80px}button{background:var(--accent);color:#0e0e10;border:0;padding:8px 14px;border-radius:4px;font:inherit;font-weight:600;cursor:pointer;margin-top:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.muted{color:var(--muted)}code{background:var(--panel-2);padding:1px 5px;border-radius:3px;font-family:ui-monospace,monospace;font-size:12px}</style>
</head><body>
<header><h1>cloud-sync</h1><nav><a href="/pairs">Pairs</a><a href="/remotes">Accounts</a></nav></header>
<main>
<h2>New sync pair</h2>
<form method="post" action="/pairs/new" class="panel">
  <label>Pair name</label>
  <input type="text" name="name" required placeholder="e.g. Obsidian / EtherDirect">

  <div class="row">
    <div>
      <label>Source remote</label>
      <select name="source_remote" required>{{REMOTES}}</select>
      <label>Source path</label>
      <input type="text" name="source_path" placeholder="/Obsidian/MyVault" />
      <p class="muted" style="font-size:11px">Folder path within the source remote. Leave blank for the root.</p>
    </div>
    <div>
      <label>Destination remote</label>
      <select name="destination_remote" required>{{REMOTES}}</select>
      <label>Destination path</label>
      <input type="text" name="destination_path" placeholder="/Obsidian/MyVault" />
    </div>
  </div>

  <label>Filters (one rclone filter per line)</label>
  <textarea name="filters">- .DS_Store
- Thumbs.db
- .obsidian/workspace*</textarea>

  <label>Poll interval (seconds, 10-3600)</label>
  <input type="number" name="poll_seconds" value="30" min="10" max="3600" />
  <p class="muted" style="font-size:11px">How often the source is polled for changes (Phase 3 polling watcher; ignored at v1 — use the Run button).</p>

  <button type="submit">Create pair</button>
</form>
</main></body></html>
