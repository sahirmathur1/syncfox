<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Syncfox · pair</title>
<style>:root{--bg:#0e0e10;--panel:#17171a;--panel-2:#1f1f24;--line:#2a2a30;--fg:#e5e5e7;--muted:#8a8a93;--accent:#3aa757;--warn:#f0a830;--err:#e15a5a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}header{padding:12px 20px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;gap:18px}header a{color:var(--fg);text-decoration:none}header h1{font-size:14px;margin:0 18px 0 0}header nav{display:flex;gap:14px;font-size:13px;color:var(--muted)}main{padding:20px;max-width:1100px;margin:0 auto}.panel{background:var(--panel);padding:18px;border-radius:6px;margin-bottom:18px}h2{margin:0 0 12px;font-size:16px}.kv{display:grid;grid-template-columns:160px 1fr;gap:8px;font-size:13px}.kv .k{color:var(--muted)}code{background:var(--panel-2);padding:1px 5px;border-radius:3px;font-family:ui-monospace,monospace;font-size:12px}button{background:var(--accent);color:#0e0e10;border:0;padding:8px 14px;border-radius:4px;font:inherit;font-weight:600;cursor:pointer}button.warn{background:var(--warn)}button.danger{background:var(--err);color:white}.actions{display:flex;gap:8px;flex-wrap:wrap}table{width:100%;border-collapse:collapse;background:var(--panel-2);border-radius:6px;overflow:hidden}th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px}th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}.muted{color:var(--muted)}a{color:var(--accent)}</style>
</head><body>
<header><h1>🦊 Syncfox</h1><nav><a href="/pairs">Pairs</a><a href="/remotes">Accounts</a><a href="/setup">Setup</a></nav></header>
<main>
<h2>{{NAME}}</h2>

<div class="panel">
  <div class="kv">
    <div class="k">Pair id</div><div><code>{{ID}}</code></div>
    <div class="k">Source</div><div><code>{{SOURCE}}</code></div>
    <div class="k">Destination</div><div><code>{{DEST}}</code></div>
    <div class="k">Poll seconds</div><div>{{POLL}}</div>
    <div class="k">Filters</div><div><pre style="margin:0;white-space:pre-wrap">{{FILTERS}}</pre></div>
    <div class="k">Initial resync</div><div>{{INITIAL}}</div>
  </div>
</div>

<div class="panel">
  <h2>Actions</h2>
  <div class="actions">
    <form method="post" action="/pairs/{{ID}}/run"><button>Run now</button></form>
    <form method="post" action="/pairs/{{ID}}/resync"><button class="warn">Resync (initial baseline)</button></form>
    <form method="post" action="/pairs/{{ID}}/pause"><button>Pause / Resume</button></form>
    <form method="post" action="/pairs/{{ID}}/delete" onsubmit="return confirm('Delete this pair? Run history is dropped too.')"><button class="danger">Delete</button></form>
  </div>
</div>

<div class="panel">
  <h2>Recent runs</h2>
  <table><thead><tr><th>Started</th><th>Status</th><th>Trigger</th><th>Exit</th><th>Stats</th></tr></thead>
  <tbody>{{RUNS}}</tbody></table>
</div>

</main></body></html>
