<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Syncfox</title>
<style>
  :root {
    --bg:#0e0e10; --panel:#17171a; --panel-2:#1f1f24; --line:#2a2a30;
    --fg:#e5e5e7; --muted:#8a8a93; --accent:#3aa757; --warn:#f0a830; --err:#e15a5a;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  header { padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel);
           display:flex; align-items:center; gap:18px; }
  header a { color:var(--fg); text-decoration:none; }
  header a:hover { color:var(--accent); }
  header h1 { font-size:14px; margin:0 18px 0 0; }
  header nav { display:flex; gap:14px; font-size:13px; color:var(--muted); }
  main { padding:20px; max-width:1100px; margin:0 auto; }
  table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:6px; overflow:hidden; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px; }
  th { background:var(--panel-2); color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .muted { color:var(--muted); }
  button { background:var(--accent); color:#0e0e10; border:0; padding:6px 12px; border-radius:4px;
           font:inherit; font-weight:600; cursor:pointer; }
  button:hover { filter:brightness(1.1); }
  button.danger { background:var(--err); color:white; }
  button.warn { background:var(--warn); color:#0e0e10; }
  input, select, textarea { background:var(--panel-2); color:var(--fg); border:1px solid var(--line);
                            padding:6px 10px; border-radius:4px; font:inherit; width:100%; }
  textarea { font-family: ui-monospace, monospace; font-size:12px; min-height:80px; }
  form .field { margin-bottom:14px; }
  form label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  form .row { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .panel { background:var(--panel); padding:18px; border-radius:6px; margin-bottom:18px; }
  code { background:var(--panel-2); padding:1px 5px; border-radius:3px; font-family:ui-monospace,monospace; font-size:12px; }
  .ok    { color: var(--accent); }
  .err   { color: var(--err); }
  .warn  { color: var(--warn); }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🦊 Syncfox</h1>
  <nav>
    <a href="/pairs">Pairs</a>
    <a href="/remotes">Accounts</a>
    <a href="/setup">Setup</a>
  </nav>
</header>
<main>
{{BODY}}
</main>
</body>
</html>
