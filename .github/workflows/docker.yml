# Phase 6 (Syncfox) — multi-arch Docker image + Docker Hub auto-publish.
#
# On every push to main → publishes `sahirmathur/syncfox:latest`.
# On every git tag matching v* → publishes the versioned tag too
# (e.g. `v0.1.0` → `sahirmathur/syncfox:0.1.0` + `:latest`).
#
# Multi-arch: linux/amd64 + linux/arm64 (Raspberry Pi 4/5 + Apple Silicon).
#
# Note: GitHub handle is `sahirmathur1`, Docker Hub handle is `sahirmathur`
# (no trailing 1) — repo is sahirmathur1/syncfox, image is sahirmathur/syncfox.
#
# REQUIRED GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   = sahirmathur
#   DOCKERHUB_TOKEN      = an access token from
#                          hub.docker.com/settings/security (NOT your password)
#
# First-time Docker Hub setup: the repo `sahirmathur/syncfox` auto-creates
# on first push; no manual setup needed beyond the token.

name: Build + publish Docker image

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds on x86 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKERHUB_USERNAME || 'sahirmathur' }}/syncfox"
          TAGS=()
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS+=("$IMAGE:latest")
            TAGS+=("$IMAGE:main-${GITHUB_SHA:0:7}")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS+=("$IMAGE:$VERSION")
            TAGS+=("$IMAGE:latest")
          fi
          # PR builds: build but don't tag for push (still verifies cross-arch
          # build doesn't break)
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            TAGS=("$IMAGE:pr-${{ github.event.pull_request.number }}")
          fi
          # Join with comma for docker/build-push-action
          IFS=,
          echo "tags=${TAGS[*]}" >> "$GITHUB_OUTPUT"

      - name: Build (and push, except on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # avoid the unsigned attestation manifest pollution
